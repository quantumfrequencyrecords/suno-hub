<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="100" fill="#0a0a0e"/>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
  </defs>
  <!-- Music note icon -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1db954" stroke-width="12" opacity="0.3"/>
  <!-- S letter for Suno -->
  <text x="256" y="310" font-family="Georgia, serif" font-size="200" font-weight="bold" fill="#1db954" text-anchor="middle" opacity="0.9">S</text>
  <!-- Pulse dot -->
  <circle cx="380" cy="148" r="24" fill="#1db954"/>
  <circle cx="380" cy="148" r="16" fill="#0a0a0e"/>
  <circle cx="380" cy="148" r="8" fill="#1db954"/>
</svg>
