<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Suno Hub">
<meta name="theme-color" content="#0a0a0e">
<link rel="manifest" href="app.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<title>Suno Prompt Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --bg:    #0a0a0e;
  --surf:  #12121a;
  --card:  #18182a;
  --raise: #1e1e30;
  --bdr:   #252538;
  --b2:    #1a1a2c;
  --text:  #e8e8f4;
  --t2:    #8888aa;
  --mute:  #484862;
  --dim:   #28283a;
  --acc:   #f5f5e8;
  --grn:   #1db954;
  --g2:    rgba(29,185,84,.15);
  --g3:    rgba(29,185,84,.07);
  --sans:  'DM Sans',-apple-system,sans-serif;
  --mono:  'DM Mono','SF Mono',monospace;
  --sat:   env(safe-area-inset-top,0px);
  --sab:   env(safe-area-inset-bottom,0px);
  --sal:   env(safe-area-inset-left,0px);
  --sar:   env(safe-area-inset-right,0px);
}

/* ── BASE ────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:15px;line-height:1.5;
  height:100%;overflow:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit}
input{font-family:var(--sans)}
::-webkit-scrollbar{display:none}

/* ── SHELL ───────────────────────────────────────────────── */
.app{
  display:flex;flex-direction:column;
  height:100vh;height:100dvh;
  padding-top:var(--sat);
  padding-left:var(--sal);
  padding-right:var(--sar);
}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar{
  flex-shrink:0;
  background:rgba(8,8,16,.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  padding:10px 16px;
  display:flex;align-items:center;gap:12px;
  z-index:100;
}
.logo{
  display:flex;align-items:center;gap:7px;
  font-family:var(--mono);font-size:11px;letter-spacing:3px;
  color:var(--acc);white-space:nowrap;flex-shrink:0;
}
.pulse{
  width:7px;height:7px;border-radius:50%;
  background:var(--grn);flex-shrink:0;
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.sw{flex:1;position:relative}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mute);font-size:15px;pointer-events:none}
#qi{
  width:100%;padding:9px 36px 9px 34px;
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:12px;color:var(--text);font-size:14px;
  outline:none;-webkit-appearance:none;
  transition:border-color .15s;
}
#qi:focus{border-color:var(--grn)}
#qi::placeholder{color:var(--mute)}
.sx{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--mute);font-size:18px;display:none;padding:4px}
#qi:not(:placeholder-shown) ~ .sx{display:block}

/* ── ACTIVE FILTER SUMMARY BAR ───────────────────────────── */
.fbar{
  flex-shrink:0;display:none;
  align-items:center;gap:6px;flex-wrap:nowrap;
  padding:7px 16px 5px;
  background:var(--surf);border-bottom:1px solid var(--bdr);
  overflow-x:auto;white-space:nowrap;
}
.fbar.on{display:flex}
.fbar-label{font-size:9px;color:var(--mute);font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;flex-shrink:0}
.af{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 9px;border-radius:16px;
  background:var(--g2);border:1px solid var(--grn);
  color:var(--grn);font-size:12px;flex-shrink:0;
}
.af-x{font-size:14px;line-height:1}
.fbar-clear{flex-shrink:0;font-size:11px;color:var(--mute);font-family:var(--mono);margin-left:4px}

/* ── LAYOUT ──────────────────────────────────────────────── */
.body{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── BOTTOM TAB BAR ──────────────────────────────────────── */
.tabbar{
  flex-shrink:0;
  background:rgba(8,8,16,.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--bdr);
  display:flex;
  padding-bottom:var(--sab);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:9px 0 6px;gap:3px;color:var(--mute);
  transition:color .15s;min-height:52px;
}
.tab.on{color:var(--grn)}
.tab-ic{font-size:21px;line-height:1}
.tab-lb{font-size:10px;font-weight:500;letter-spacing:.3px}

/* ── CONTENT ──────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.screen{display:none}
.screen.on{display:block}

/* ── HOME ────────────────────────────────────────────────── */
.statsbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 4px}
.stats-t{font-size:10px;color:var(--mute);font-family:var(--mono)}
.ref-btn{font-size:10px;color:var(--mute);font-family:var(--mono);padding:4px 8px;border:1px solid var(--bdr);border-radius:4px}
.home-hd{padding:4px 16px 14px}
.home-title{font-size:24px;font-weight:700;color:var(--acc);margin-bottom:2px}
.home-sub{font-size:12px;color:var(--t2)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 24px}
.acard{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:12px;padding:14px 12px;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  transition:transform .1s;
}
.acard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.acard:active{transform:scale(.97)}
.ac-era{font-size:9px;color:var(--mute);font-family:var(--mono);margin-bottom:3px;margin-top:8px}
.ac-nm{font-size:13px;font-weight:700;color:var(--acc);margin-bottom:6px;line-height:1.2}
.ac-genres{display:flex;flex-wrap:wrap;gap:3px}
.ac-genre{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.04);color:var(--mute);border:1px solid var(--bdr)}

/* ── BROWSE — FILTER PANELS ──────────────────────────────── */
.browse-hd{padding:18px 16px 8px}
.browse-title{font-size:24px;font-weight:700;color:var(--acc);margin-bottom:3px}
.browse-sub{font-size:12px;color:var(--t2);margin-bottom:0}

/* Panel search */
.panel-search-wrap{padding:8px 16px 4px}
.panel-qi{
  width:100%;padding:10px 14px;
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:12px;color:var(--text);font-size:14px;
  outline:none;-webkit-appearance:none;
}
.panel-qi:focus{border-color:var(--grn)}
.panel-qi::placeholder{color:var(--mute)}

/* Filter dimension panel */
.fdim{
  margin:0 16px 8px;
  background:var(--card);border:1px solid var(--bdr);
  border-radius:12px;overflow:hidden;
}
/* Panel header — tap to collapse */
.fdim-hd{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .1s;
  min-height:52px; /* large touch target */
}
.fdim-hd:active{background:var(--raise)}
.fdim-ic{font-size:18px;flex-shrink:0}
.fdim-label{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.fdim-active-badge{
  font-size:10px;padding:2px 8px;border-radius:10px;
  background:var(--g2);border:1px solid var(--grn);
  color:var(--grn);font-family:var(--mono);flex-shrink:0;
}
.fdim-count{font-size:11px;color:var(--mute);font-family:var(--mono);flex-shrink:0}
.fdim-chevron{font-size:13px;color:var(--mute);transition:transform .2s;flex-shrink:0}
.fdim.open .fdim-chevron{transform:rotate(180deg)}

/* Panel body — the pills */
.fdim-body{
  display:none;
  padding:0 12px 12px;
  border-top:1px solid var(--b2);
}
.fdim.open .fdim-body{display:block}

/* Scrollable horizontal chip row for BPM (small number of options) */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;padding-top:10px}

/* Filter pill */
.fp{
  display:inline-flex;align-items:center;gap:5px;
  padding:9px 14px;border-radius:10px;
  background:var(--surf);border:1px solid var(--bdr);
  color:var(--t2);font-size:13px;font-weight:500;
  transition:all .1s;
  -webkit-tap-highlight-color:transparent;
  min-height:44px; /* Apple HIG minimum tap target */
}
.fp:active{transform:scale(.95)}
.fp.on{background:var(--g2);border-color:var(--grn);color:var(--grn)}
.fp-c{font-family:var(--mono);font-size:10px;color:var(--mute)}
.fp.on .fp-c{color:rgba(29,185,84,.6)}

/* Clear-dimension button */
.dim-clear{
  display:block;width:100%;margin-top:8px;
  padding:8px;border-radius:8px;
  font-size:11px;color:var(--mute);font-family:var(--mono);
  border:1px solid var(--b2);text-align:center;
  transition:color .15s;
}
.dim-clear:active{color:var(--text)}

/* Results count bar inside browse */
.browse-results{
  padding:10px 16px 6px;
  font-size:11px;color:var(--mute);font-family:var(--mono);
  letter-spacing:.5px;
}

/* ── ALL SONGS ────────────────────────────────────────────── */
.songs-hd{padding:18px 16px 10px;border-bottom:1px solid var(--bdr)}
.songs-title{font-size:24px;font-weight:700;color:var(--acc);margin-bottom:2px}
.songs-sub{font-size:12px;color:var(--t2)}
.songs-list{padding:4px 0 24px}

/* ── ARTIST DETAIL ────────────────────────────────────────── */
.detail-topbar{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:10;
  background:rgba(10,10,14,.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.back-btn{
  display:flex;align-items:center;gap:2px;
  color:var(--grn);font-size:14px;font-weight:600;
  padding:6px 4px;margin:-6px -4px;
  min-width:44px;min-height:44px; /* tap target */
  align-items:center;
}
.back-ic{font-size:22px;line-height:1}
.detail-nm{
  font-size:15px;font-weight:700;color:var(--acc);
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.artist-info-block{
  padding:16px;display:flex;gap:12px;align-items:flex-start;
  border-bottom:1px solid var(--bdr);
}
.artist-icon{
  width:56px;height:56px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.ai-t{flex:1;min-width:0}
.ai-nm{font-size:17px;font-weight:700;margin-bottom:2px}
.ai-era{font-size:10px;color:var(--mute);font-family:var(--mono);margin-bottom:4px}
.ai-bio{font-size:12px;color:var(--t2);line-height:1.6}
.ai-genres{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.ai-genre{font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.04);color:var(--t2);border:1px solid var(--bdr)}
.prod-note{padding:8px 16px;font-size:10px;color:var(--mute);font-family:var(--mono);background:var(--surf);border-bottom:1px solid var(--bdr);line-height:1.6}

/* ── SONG ROWS ────────────────────────────────────────────── */
.song-row{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;border-bottom:1px solid var(--b2);
  min-height:66px;
  -webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.song-row:active{background:var(--raise)}
.song-row.on{background:var(--raise)}
.sr-num{font-family:var(--mono);font-size:11px;color:var(--mute);min-width:22px;text-align:right;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.sr-meta{font-size:11px;color:var(--mute);font-family:var(--mono)}
.sr-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.stg{font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap}
.stg-b{background:rgba(29,185,84,.1);color:#6ec98a;border:1px solid rgba(29,185,84,.18)}
.stg-m{background:rgba(155,109,255,.1);color:#c4a0ff;border:1px solid rgba(155,109,255,.18)}
.sr-arr{color:var(--dim);font-size:14px;flex-shrink:0}
.alb-divider{padding:14px 16px 6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mute);font-family:var(--mono);border-top:1px solid var(--bdr);margin-top:8px}

/* ── PROMPT SHEET ─────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:200;display:none;align-items:flex-end;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.overlay.on{display:flex}
.sheet{
  width:100%;max-height:93vh;
  background:var(--card);border-radius:20px 20px 0 0;
  padding-bottom:calc(16px + var(--sab));
  overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.32,1,.23,1);
  border-top:1px solid var(--bdr);
}
.overlay.on .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--dim);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sheet-hd{
  padding:10px 20px 10px;border-bottom:1px solid var(--bdr);
  flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-start;
}
.sheet-title-wrap{flex:1;margin-right:12px}
.sheet-title{font-size:17px;font-weight:700;color:var(--acc);line-height:1.2}
.sheet-sub{font-size:10px;color:var(--mute);font-family:var(--mono);margin-top:3px}
.sheet-close{
  color:var(--mute);font-size:24px;
  min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}

/* Tag pills in sheet */
.sheet-tags{display:flex;flex-wrap:wrap;gap:5px;padding:12px 16px 6px}
.sht{font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer;min-height:32px;display:inline-flex;align-items:center}

/* DNA */
.sheet-dna{
  margin:0 16px 12px;background:var(--surf);
  border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;
}
.dna-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);color:var(--mute);margin-bottom:5px}
.dna-text{font-size:12px;color:var(--t2);line-height:1.75}

/* Prompt blocks */
.pb{margin:0 16px 10px}
.pb-label{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  font-family:var(--mono);font-weight:600;
  margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;
}
.pb-hint{font-size:9px;color:var(--mute);font-weight:400;letter-spacing:1px;text-transform:none}
.pb-box{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.pb-text{
  padding:12px 14px;font-size:12px;color:#b0b0cc;
  font-family:var(--mono);line-height:1.8;
  white-space:pre-wrap;max-height:190px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}

/* BIG COPY BUTTON */
.copy-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:calc(100% - 24px);margin:8px 12px 10px;padding:15px;
  background:var(--g3);border:1px solid rgba(29,185,84,.3);
  color:var(--grn);border-radius:12px;
  font-size:15px;font-weight:700;
  min-height:56px;
  transition:all .1s;
  -webkit-tap-highlight-color:transparent;
}
.copy-btn:active{background:var(--g2);transform:scale(.98)}
.copy-btn.ok{background:var(--g2);border-color:var(--grn)}
.copy-ic{font-size:17px}

/* ── SEARCH ───────────────────────────────────────────────── */
.sg-label{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--mute);font-family:var(--mono);
  padding:14px 16px 6px;border-bottom:1px solid var(--bdr);margin-bottom:2px;
}
.sres{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;border-bottom:1px solid var(--b2);
  min-height:62px;
  -webkit-tap-highlight-color:transparent;
}
.sres:active{background:var(--raise)}
.sres-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sres-c{flex:1;min-width:0}
.sres-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.sres-sub{font-size:11px;color:var(--mute);font-family:var(--mono)}
.sres-match{font-size:11px;color:var(--t2);margin-top:2px;font-style:italic;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ── EMPTY / LOADING ─────────────────────────────────────── */
.empty{text-align:center;padding:52px 24px}
.empty-ic{font-size:44px;margin-bottom:12px}
.empty h3{font-size:18px;font-weight:700;color:var(--dim);margin-bottom:6px}
.empty p{font-size:12px;color:var(--mute);line-height:1.7;max-width:280px;margin:0 auto}
.loading{text-align:center;padding:60px 16px;color:var(--mute);font-family:var(--mono);font-size:11px;letter-spacing:2px}

/* ── TOAST ────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:calc(76px + var(--sab));left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--grn);color:#000;
  font-size:14px;font-weight:700;
  padding:11px 22px;border-radius:22px;
  opacity:0;transition:all .2s;
  pointer-events:none;z-index:500;white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── OFFLINE BANNER ──────────────────────────────────────── */
.offline{display:none;background:#2a1a00;border-bottom:1px solid #554400;padding:7px 16px;font-size:11px;color:#d4a843;text-align:center;flex-shrink:0}
.offline.on{display:block}
</style>
</head>
<body>
<div class="app">

  <div class="offline" id="offline-banner">⚡ Offline — using cached data</div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo"><div class="pulse"></div>SUNO HUB</div>
    <div class="sw">
      <span class="si">⌕</span>
      <input type="search" id="qi" placeholder="Search anything…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="sx" onclick="clearSearch()">×</button>
    </div>
  </div>

  <!-- ACTIVE FILTERS -->
  <div class="fbar" id="fbar">
    <span class="fbar-label">Filters:</span>
    <div id="fbar-chips" style="display:flex;gap:5px;flex-shrink:0"></div>
    <button class="fbar-clear" onclick="clearAll()">Clear all</button>
  </div>

  <!-- BODY -->
  <div class="body">
    <div class="content" id="content">

      <!-- HOME -->
      <div class="screen on" id="s-home">
        <div class="statsbar">
          <span class="stats-t" id="stats-t">Loading…</span>
          <button class="ref-btn" onclick="refreshData()">↻ Refresh</button>
        </div>
        <div class="home-hd">
          <div class="home-title">Artists</div>
          <div class="home-sub">Tap to browse songs &amp; copy Suno prompts</div>
        </div>
        <div class="agrid" id="agrid"></div>
      </div>

      <!-- BROWSE — FILTER PANELS -->
      <div class="screen" id="s-browse">
        <div class="browse-hd">
          <div class="browse-title">Browse</div>
          <div class="browse-sub">Filter songs by any combination of dimensions</div>
        </div>
        <!-- Panel keyword search -->
        <div class="panel-search-wrap">
          <input type="search" class="panel-qi" id="pqi" placeholder="Search keywords across all filters…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <div class="browse-results" id="browse-results"></div>
        <!-- Filter dimension panels injected here -->
        <div id="filter-panels" style="padding:0 0 24px"></div>
      </div>

      <!-- ALL SONGS -->
      <div class="screen" id="s-songs">

<script>
// ──────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────
let DB = [];          // array of loaded artist objects
let TC = {};          // tag counts: { category: [[tag, count], ...] }
let filters = {};     // active filters: { bpm_tier: 'Fast', mood: 'Euphoric', ... }
let view = 'home';
let prevView = 'home';
let curArtist = null;
let searchQ = '';

// ──────────────────────────────────────────────────────────────
// KEYWORD EXTRACTION  (runs client-side, no server needed)
// ──────────────────────────────────────────────────────────────
const BPM_TIERS = [
  ['Very Slow',0,70],['Slow',71,90],['Mid-Slow',91,109],
  ['Mid-Tempo',110,129],['Upbeat',130,149],['Fast',150,169],['Very Fast',170,9999]
];
const RULES = {
  instruments:{
    'Acoustic Guitar':  ['acoustic guitar','acoustic '],
    'Electric Guitar':  ['electric guitar','power chord','distorted guitar','palm-muted'],
    'Pedal Steel':      ['pedal steel'],
    'Piano':            ['piano'],
    'Synth / Juno':     ['juno','synth','synthesizer','moog'],
    'Drums':            ['drum machine','live drummer','drumming','travis barker','brad wilk'],
    '808 / Bass':       ['808','bass guitar','bass-forward','funk bass'],
    'Banjo':            ['banjo'],
    'Strings':          ['strings','cello','violin','fiddle','orchestral'],
    'Horns':            ['horn','brass','saxophone'],
    'Mellotron':        ['mellotron'],
    'Hammond Organ':    ['hammond','organ '],
    'Tambourine':       ['tambourine'],
  },
  vocals:{
    'Male Tenor':       ['male tenor','tenor'],
    'Baritone':         ['baritone'],
    'Dual Vocal':       ['dual vocal','two vocal','alternating vocals','tag team'],
    'Whispered':        ['whispered','breathy','close-mic'],
    'Screamed / Belted':['screamed','scream','belted','belting','yelling'],
    'Rap / Spoken':     ['rap ','rapped','spoken word','hip-hop vocal'],
    'Gang Vocals':      ['gang vocal','crowd vocal','singalong backing'],
    'Earnest / Sincere':['earnest','sincere','unguarded'],
    'Sardonic / Wry':   ['sardonic','wry','sneering','sarcastic'],
  },
  mood:{
    'Euphoric':         ['euphoric','joyful ','celebratory','uplifting','triumphant'],
    'Melancholic':      ['melancholic','melancholy','aching','wistful','bittersweet'],
    'Angry / Furious':  ['angry','fury','furious','rage ','contemptuous','seething'],
    'Tender / Romantic':['tender','romantic','devotion','loving','warm ','heartfelt','besotted'],
    'Anxious':          ['anxious','anxiety','nervous ','restless','urgent','breathless'],
    'Anthemic':         ['anthemic','anthem','arena','stadium','fist-pump'],
    'Haunting / Dark':  ['haunting','gothic','dark ','atmospheric','eerie','ghostly'],
    'Playful':          ['playful','funny','comedic','charming','gleeful'],
    'Cathartic':        ['cathartic','release ','explosion','escalation'],
    'Nostalgic':        ['nostalgic','nostalgia','memory','looking back'],
    'Defiant':          ['defiant','rebellion','rebellious','resist','refusal'],
  },
  production_era:{
    '90s Raw':          ['90s','late-90s','lo-fi garage','jerry finn','debut era'],
    '2000s Polished':   ['2000s','toypaj','rob cavallo','polished nashville'],
    'Modern (2015+)':   ['modern ','contemporary','2023','2024','2025'],
    'Bedroom / Indie':  ['bedroom','home-studio','lo-fi','antonoff brooklyn'],
    'Analog / Vintage': ['analog','vintage','mellotron','warm analog','classic'],
  },
  lyric_themes:{
    'Love & Devotion':  ['devotion','love song','romantic','wife ','wedding','first dance','belonging'],
    'Breakup / Loss':   ['breakup','heartbreak',' ex ','miss you','longing'],
    'Revenge':          ['revenge','vindication','payback','gleeful','schadenfreude'],
    'Nostalgia / Hometown':['hometown','small town','nostalgia','growing up','teenage'],
    'Political / Protest':['political','protest','government','war ','media','corporate','capitalism'],
    'Youth / Rebellion':['youth','rebellion','anti-authority','reckless','society'],
    'Anxiety / Mental Health':['anxiety','panic','mental health','therapy','breakdown'],
    'Fatherhood / Family':['father','daughter','son ','family','kids ','dad '],
    'Ambition / Identity':['ambition','identity','reinvention','starting over','city '],
    'Secret Love':      ['secret','forbidden','hidden','sneaking'],
    'Night / Late Night':['late night','midnight','2am','3am','night ','closing time'],
  },
  structure:{
    'Short (< 2:30)':   ['under 2:30','under 2 minutes','under 1:45'],
    'Epic (7+ min)':    ['7 minutes','8 minutes','9 minutes','multi-movement','suite'],
    'Quiet-Loud Arc':   ['quiet-loud','builds from','builds to','crescendo'],
    'Dual Narrative':   ['dual vocal','two voices','alternating'],
    'Spoken Word':      ['spoken word'],
    'No Chorus':        ['no traditional chorus','no chorus'],
  }
};

function extractTags(song) {
  const txt = [song.style_prompt||'',song.lyric_prompt||'',song.dna||'',song.vibe||'',song.title||''].join(' ').toLowerCase();
  const tags = {bpm_tier:null,instruments:[],vocals:[],mood:[],production_era:[],lyric_themes:[],structure:[]};
  const bpm = song.bpm;
  if (bpm && String(bpm).match(/^\d/)) {
    const b = parseInt(bpm);
    for (const [n,lo,hi] of BPM_TIERS) { if (b>=lo&&b<=hi){tags.bpm_tier=n;break;} }
  } else if (bpm && String(bpm).toLowerCase().includes('multi')) tags.bpm_tier='Variable';
  for (const [cat,rules] of Object.entries(RULES)) {
    for (const [label,kws] of Object.entries(rules)) {
      if (kws.some(kw=>txt.includes(kw))) tags[cat].push(label);
    }
  }
  if (['under 2:30','under 2 minutes','under 1:45'].some(s=>txt.includes(s)))
    if(!tags.structure.includes('Short (< 2:30)')) tags.structure.push('Short (< 2:30)');
  return tags;
}

// ──────────────────────────────────────────────────────────────
// DATA LOADING
// ──────────────────────────────────────────────────────────────
async function loadAll() {
  let files;
  try {
    const r = await fetch('./manifest.json?_='+Date.now());
    const m = await r.json();
    files = m.files || [];
  } catch(e) {
    document.getElementById('s-home').innerHTML = `<div class="empty"><div class="empty-ic">⚠️</div><h3>Setup Needed</h3><p>Make sure manifest.json is in the same folder as index.html. See SETUP_GUIDE.md for instructions.</p></div>`;
    return;
  }
  DB = [];
  const acc = {bpm_tier:{},instruments:{},vocals:{},mood:{},production_era:{},lyric_themes:{},structure:{},genres:{}};
  await Promise.all(files.map(async fn => {
    try {
      const r = await fetch('./'+fn+'?_='+Date.now());
      if (!r.ok) return;
      const d = await r.json();
      (d.songs||[]).forEach(s => {
        s.tags = extractTags(s);
        const t = s.tags;
        if (t.bpm_tier) acc.bpm_tier[t.bpm_tier]=(acc.bpm_tier[t.bpm_tier]||0)+1;
        ['instruments','vocals','mood','production_era','lyric_themes','structure'].forEach(c => {
          (t[c]||[]).forEach(tag=>{acc[c][tag]=(acc[c][tag]||0)+1;});
        });
      });
      (d.genres||[]).forEach(g=>{acc.genres[g]=(acc.genres[g]||0)+1;});
      DB.push(d);
    } catch(e){}
  }));
  TC = {};
  for (const [cat,counts] of Object.entries(acc))
    TC[cat] = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  boot();
}

function boot() {
  const total = DB.reduce((s,a)=>s+(a.songs||[]).length,0);
  document.getElementById('stats-t').textContent = `${DB.length} artists · ${total} songs`;
  document.getElementById('songs-sub').textContent = `${total} songs across ${DB.length} artists`;
  buildHome();
  buildFilterPanels();
  buildAllSongs();
}

// ──────────────────────────────────────────────────────────────
// HOME
// ──────────────────────────────────────────────────────────────
function buildHome() {
  let arts = DB;
  if (Object.keys(filters).length) arts = arts.filter(a=>(a.songs||[]).some(s=>smf(s)));
  const g = document.getElementById('agrid');
  g.innerHTML = '';
  arts.forEach(a => {
    const el = document.createElement('div');
    el.className = 'acard';
    el.onclick = () => openArtist(a.id);
    const genres = (a.genres||[]).slice(0,3).map(g=>`<span class="ac-genre">${g}</span>`).join('');
    el.innerHTML = `<style>.acard:nth-of-type(${DB.indexOf(a)+1})::before{background:${a.color||'#555'}}</style>
      <div class="ac-era">${a.era||''} · ${(a.songs||[]).length} songs</div>
      <div class="ac-nm">${a.name}</div>
      <div class="ac-genres">${genres}</div>`;
    g.appendChild(el);
  });
  if (!arts.length) g.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-ic">🔍</div><h3>No Results</h3><p>Clear filters to see all artists.</p></div>';
}

// ──────────────────────────────────────────────────────────────
// FILTER PANELS  (the main feature — one panel per dimension)
// ──────────────────────────────────────────────────────────────
const DIMS = [
  {k:'bpm_tier',      label:'Tempo / BPM',       ic:'🥁', desc:'Filter by song speed'},
  {k:'mood',          label:'Mood & Energy',      ic:'⚡', desc:'Emotional tone'},
  {k:'lyric_themes',  label:'Lyric Themes',       ic:'📝', desc:'What the song is about'},
  {k:'instruments',   label:'Instruments',        ic:'🎸', desc:'Key sounds in the production'},
  {k:'vocals',        label:'Vocal Style',        ic:'🎤', desc:'How the vocal is delivered'},
  {k:'genres',        label:'Genre',              ic:'🎵', desc:'Musical genre'},
  {k:'production_era',label:'Production Era',     ic:'🎛️', desc:'When and how it was made'},
  {k:'structure',     label:'Song Structure',     ic:'📐', desc:'How the song is built'},
];

function buildFilterPanels(ql='') {
  const container = document.getElementById('filter-panels');
  container.innerHTML = '';

  DIMS.forEach(dim => {
    let tags = TC[dim.k] || [];
    if (ql) tags = tags.filter(([tag])=>tag.toLowerCase().includes(ql.toLowerCase()));
    if (!tags.length) return;

    const activeTag = filters[dim.k];
    const hasFilter = !!activeTag;
    const isOpen = hasFilter || ql.length > 0; // auto-open if filtered or searching

    const panel = document.createElement('div');
    panel.className = 'fdim' + (isOpen ? ' open' : '');
    panel.id = 'fdim-' + dim.k;

    const badge = hasFilter ? `<span class="fdim-active-badge">${activeTag}</span>` : `<span class="fdim-count">${tags.length} options</span>`;

    panel.innerHTML = `
      <div class="fdim-hd" onclick="togglePanel('${dim.k}')">
        <span class="fdim-ic">${dim.ic}</span>
        <span class="fdim-label">${dim.label}</span>
        ${badge}
        <span class="fdim-chevron">▾</span>
      </div>
      <div class="fdim-body" id="fdim-body-${dim.k}">
        <div class="chip-row">
          ${tags.map(([tag,ct]) => `
            <button class="fp${filters[dim.k]===tag?' on':''}" onclick="togF('${dim.k}','${tag.replace(/'/g,"\\'")}')">
              ${tag}<span class="fp-c">${ct}</span>
            </button>`).join('')}
        </div>
        ${hasFilter ? `<button class="dim-clear" onclick="clearDim('${dim.k}')">Clear ${dim.label}</button>` : ''}
      </div>`;

    container.appendChild(panel);
  });

  // Results count
  updateBrowseResultCount();
}

function togglePanel(key) {
  const el = document.getElementById('fdim-'+key);
  if (el) el.classList.toggle('open');
}

document.getElementById('pqi').addEventListener('input', function() {
  buildFilterPanels(this.value);
});

function updateBrowseResultCount() {
  let all = [];
  DB.forEach(a=>(a.songs||[]).forEach(s=>all.push(s)));
  const filtered = Object.keys(filters).length ? all.filter(s=>smf(s)) : all;
  const el = document.getElementById('browse-results');
  if (Object.keys(filters).length) {
    el.textContent = `${filtered.length} song${filtered.length!==1?'s':''} match current filters`;
    el.style.color = 'var(--grn)';
  } else {
    el.textContent = `${all.length} total songs — select filters to narrow down`;
    el.style.color = 'var(--mute)';
  }
}

// ──────────────────────────────────────────────────────────────
// FILTER LOGIC
// ──────────────────────────────────────────────────────────────
function togF(cat, tag) {
  filters[cat] === tag ? delete filters[cat] : (filters[cat] = tag);
  onFilterChange();
}
function clearDim(cat) {
  delete filters[cat];
  onFilterChange();
}
function clearAll() {
  filters = {};
  onFilterChange();
  document.getElementById('pqi').value = '';
}
function onFilterChange() {
  updateFbar();
  buildHome();
  buildAllSongs();
  buildFilterPanels(document.getElementById('pqi').value);
  if (curArtist && view==='artist') openArtist(curArtist);
}
function updateFbar() {
  const bar = document.getElementById('fbar');
  const chips = document.getElementById('fbar-chips');
  const en = Object.entries(filters);
  chips.innerHTML = '';
  if (!en.length) { bar.classList.remove('on'); return; }
  bar.classList.add('on');
  const labels = {bpm_tier:'BPM',instruments:'Instr',vocals:'Vocal',mood:'Mood',production_era:'Era',lyric_themes:'Theme',structure:'Structure',genres:'Genre'};
  en.forEach(([cat,tag])=>{
    const c = document.createElement('span');
    c.className = 'af';
    c.innerHTML = `${labels[cat]||cat}: ${tag} <span class="af-x" onclick="clearDim('${cat}')">×</span>`;
    chips.appendChild(c);
  });
}
function smf(s) {
  for (const [cat,tag] of Object.entries(filters)) {
    const t = s.tags; if (!t) return false;
    if (cat==='bpm_tier'){if(t.bpm_tier!==tag)return false;}
    else if(Array.isArray(t[cat])){if(!t[cat].includes(tag))return false;}
    else return false;
  }
  return true;
}

// ──────────────────────────────────────────────────────────────
// ALL SONGS
// ──────────────────────────────────────────────────────────────
function buildAllSongs() {
  let all = [];
  DB.forEach(a=>(a.songs||[]).forEach((s,i)=>all.push({s,a,i})));
  if (Object.keys(filters).length) all=all.filter(({s})=>smf(s));
  document.getElementById('songs-sub').textContent = `${all.length} song${all.length!==1?'s':''} ${Object.keys(filters).length?'matching filters':'total'}`;
  const el = document.getElementById('all-songs-list');
  el.innerHTML = '';
  all.forEach(({s,a,i},n)=>el.appendChild(makeSongRow(s,a,i,n+1,true)));
  if (!all.length) el.innerHTML = '<div class="empty"><div class="empty-ic">🎵</div><h3>No Songs Match</h3><p>Try clearing some filters.</p></div>';
}

// ──────────────────────────────────────────────────────────────
// ARTIST DETAIL
// ──────────────────────────────────────────────────────────────
function openArtist(id) {
  curArtist = id; prevView = view;
  showScreen('artist');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const a = DB.find(x=>x.id===id); if(!a)return;
  document.getElementById('detail-nm').textContent = a.name;
  let songs = a.songs||[];
  if (Object.keys(filters).length) songs=songs.filter(s=>smf(s));
  const genres = (a.genres||[]).map(g=>`<span class="ai-genre">${g}</span>`).join('');
  const rows = songs.map((s,i)=>makeSongRow(s,a,(a.songs||[]).indexOf(s),i+1,false));
  let albsec = '';
  if((a.albums||[]).length){
    const ar=(a.albums||[]).map((al,i)=>{
      const el=document.createElement('div');
      el.className='song-row';
      el.innerHTML=`<span class="sr-num" style="color:${a.color||'var(--mute)'}">♦</span>
        <div class="sr-info"><div class="sr-title">${al.title}</div><div class="sr-meta">Album prompt ${al.year?'· '+al.year:''}</div></div>
        <span class="sr-arr">›</span>`;
      el.onclick=()=>openAlbSheet(a,i);
      return el.outerHTML;
    }).join('');
    albsec=`<div class="alb-divider">Album-Wide Prompts</div><div class="songs-list">${ar}</div>`;
  }
  document.getElementById('artist-body').innerHTML = `
    <div class="artist-info-block">
      <div class="artist-icon" style="background:${a.color||'#666'}22;border:1px solid ${a.color||'#666'}33">🎵</div>
      <div class="ai-t">
        <div class="ai-nm" style="color:${a.color||'var(--acc)'}">${a.name}</div>
        <div class="ai-era">${a.era||''} · ${(a.songs||[]).length} songs</div>
        <div class="ai-bio">${(a.bio||'').slice(0,200)}…</div>
        <div class="ai-genres">${genres}</div>
      </div>
    </div>
    ${a.producer_notes?`<div class="prod-note">${a.producer_notes}</div>`:''}
    <div class="songs-list" id="artist-rows"></div>
    ${albsec}`;
  const sl=document.getElementById('artist-rows');
  rows.forEach(r=>sl.appendChild(r));
  if(!rows.length)sl.innerHTML='<div class="empty"><p>No songs match filters.</p></div>';
}

function makeSongRow(s,a,idx,num,showArtist){
  const el=document.createElement('div');
  el.className='song-row';
  const bt=s.tags?.bpm_tier?`<span class="stg stg-b">${s.tags.bpm_tier}</span>`:'';
  const mt=s.tags?.mood?.[0]?`<span class="stg stg-m">${s.tags.mood[0]}</span>`:'';
  const sub=showArtist?`${a.name} · ${s.album||''} ${s.year?'· '+s.year:''}`:`${s.album||''} ${s.year?'· '+s.year:''} ${s.bpm?'· '+s.bpm+' BPM':''}`;
  el.innerHTML=`
    <span class="sr-num" style="color:${a.color||'var(--mute)'}">${String(num).padStart(2,'0')}</span>
    <div class="sr-info">
      <div class="sr-title">${s.title}</div>
      <div class="sr-meta">${sub}</div>
    </div>
    <div class="sr-right">${bt}${mt}</div>
    <span class="sr-arr">›</span>`;
  el.onclick=()=>openSongSheet(s,a);
  return el;
}

// ──────────────────────────────────────────────────────────────
// PROMPT SHEET
// ──────────────────────────────────────────────────────────────
function openSongSheet(s,a){
  document.getElementById('sh-title').textContent=s.title;
  document.getElementById('sh-sub').textContent=`${a.name} · ${s.album||''} ${s.year?'· '+s.year:''} ${s.bpm?'· '+s.bpm+' BPM':''}`;
  const color=a.color||'var(--grn)';
  const id=Math.random().toString(36).slice(2);
  const tags=buildSheetTags(s.tags,color);
  const dna=s.dna?`<div class="sheet-dna"><div class="dna-label">Sonic DNA</div><div class="dna-text">${s.dna}</div></div>`:'';
  const sp=s.style_prompt?buildPB('sp-'+id,'STYLE PROMPT','→ paste into Suno Style field',s.style_prompt,color):'';
  const lp=s.lyric_prompt?buildPB('lp-'+id,'LYRIC GENERATION PROMPT','→ paste into Lyrics → Generate',s.lyric_prompt,color):'';
  document.getElementById('sh-body').innerHTML=tags+dna+sp+lp;
  openSheet();
}
function openAlbSheet(a,idx){
  const al=(a.albums||[])[idx];if(!al)return;
  document.getElementById('sh-title').textContent=al.title;
  document.getElementById('sh-sub').textContent=`${a.name} · Album Prompt ${al.year?'· '+al.year:''}`;
  const id=Math.random().toString(36).slice(2);
  const sp=al.style_prompt?buildPB('sp-'+id,'ALBUM STYLE PROMPT','→ Style field',al.style_prompt,a.color||'var(--grn)'):'';
  const lp=al.lyric_prompt?buildPB('lp-'+id,'ALBUM LYRIC PROMPT','→ Lyrics field → Generate',al.lyric_prompt,a.color||'var(--grn)'):'';
  document.getElementById('sh-body').innerHTML=sp+lp;
  openSheet();
}
function buildPB(id,label,hint,text,color){
  return `<div class="pb">
    <div class="pb-label" style="color:${color}">${label}<span class="pb-hint">${hint}</span></div>
    <div class="pb-box">
      <div class="pb-text" id="${id}">${text}</div>
      <button class="copy-btn" onclick="copyText('${id}')">
        <span class="copy-ic">⎘</span> Copy
      </button>
    </div>
  </div>`;
}
function buildSheetTags(tags,color){
  if(!tags)return'';
  const cats=[
    {k:'bpm_tier',    ia:false,bg:'rgba(29,185,84,.1)',  c:'#6ec98a',b:'rgba(29,185,84,.18)'},
    {k:'mood',        ia:true, bg:'rgba(155,109,255,.1)',c:'#c4a0ff',b:'rgba(155,109,255,.18)'},
    {k:'lyric_themes',ia:true, bg:'rgba(255,165,2,.08)', c:'#d4a843',b:'rgba(255,165,2,.16)'},
    {k:'instruments', ia:true, bg:'rgba(74,184,196,.1)', c:'#6dd4de',b:'rgba(74,184,196,.18)'},
    {k:'vocals',      ia:true, bg:'rgba(168,224,99,.08)',c:'#a8d860',b:'rgba(168,224,99,.16)'},
    {k:'production_era',ia:true,bg:'rgba(200,146,42,.08)',c:'#c8922a',b:'rgba(200,146,42,.16)'},
    {k:'structure',   ia:true, bg:'rgba(90,180,232,.1)', c:'#7abee8',b:'rgba(90,180,232,.18)'},
  ];
  let h='<div class="sheet-tags">';
  cats.forEach(cat=>{
    const vals=cat.ia?(tags[cat.k]||[]):(tags[cat.k]?[tags[cat.k]]:[]);
    vals.forEach(v=>{
      h+=`<span class="sht" style="background:${cat.bg};color:${cat.c};border:1px solid ${cat.b}" onclick="togF('${cat.k}','${v.replace(/'/g,"\\'")}');closeSheet();goTab('songs')">${v}</span>`;
    });
  });
  return h+'</div>';
}
function openSheet(){
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>{document.getElementById('sh-body').scrollTop=0;},50);
}
function closeSheet(){document.getElementById('overlay').classList.remove('on')}
function sheetOut(e){if(e.target===document.getElementById('overlay'))closeSheet();}

// ──────────────────────────────────────────────────────────────
// SEARCH
// ──────────────────────────────────────────────────────────────
document.getElementById('qi').addEventListener('input',function(){
  searchQ=this.value.trim();
  if(!searchQ){if(view==='search')goTab(prevView||'home');return;}
  doSearch(searchQ);
});
function clearSearch(){
  document.getElementById('qi').value='';searchQ='';
  if(view==='search')goTab('home');
}
function doSearch(q){
  showScreen('search');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const ql=q.toLowerCase(),arts=[],songs=[];
  DB.forEach(a=>{
    if((a.name+' '+(a.bio||'')+' '+(a.genres||[]).join(' ')).toLowerCase().includes(ql)) arts.push(a);
    (a.songs||[]).forEach((s,i)=>{
      const txt=[s.title,s.album,s.vibe,s.dna,s.style_prompt,s.lyric_prompt,
        ...(s.tags?.mood||[]),...(s.tags?.instruments||[]),...(s.tags?.lyric_themes||[]),
        ...(s.tags?.vocals||[]),s.tags?.bpm_tier||''].join(' ').toLowerCase();
      if(txt.includes(ql)){
        const full=(s.style_prompt+' '+s.lyric_prompt).toLowerCase();
        const mi=full.indexOf(ql);
        let mx='';
        if(mi>=0){const st=Math.max(0,mi-24),en=Math.min(full.length,mi+ql.length+44);
          mx='…'+full.slice(st,en).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<b style="color:var(--grn)">${m}</b>`)+'…';}
        songs.push({a,s,i,mx});
      }
    });
  });
  const ah=arts.map(a=>`<div class="sres" onclick="openArtist('${a.id}')">
    <span class="sres-dot" style="background:${a.color||'#666'}"></span>
    <div class="sres-c"><div class="sres-title">${a.name}</div>
    <div class="sres-sub">${(a.genres||[]).slice(0,2).join(' · ')} · ${(a.songs||[]).length} songs</div></div>
    <span class="sr-arr">›</span></div>`).join('');
  const sh=songs.map(({a,s,i,mx})=>`<div class="sres" onclick="openSongSheet(DB.find(x=>x.id==='${a.id}').songs[${i}],DB.find(x=>x.id==='${a.id}'))">
    <span class="sres-dot" style="background:${a.color||'#666'}"></span>
    <div class="sres-c"><div class="sres-title">${s.title}</div>
    <div class="sres-sub">${a.name} · ${s.album||''} ${s.year?'· '+s.year:''}</div>
    ${mx?`<div class="sres-match">${mx}</div>`:''}</div>
    <span class="sr-arr">›</span></div>`).join('');
  const tot=arts.length+songs.length;
  document.getElementById('search-body').innerHTML=
    `${arts.length?`<div class="sg-label">Artists (${arts.length})</div>${ah}`:''}
     ${songs.length?`<div class="sg-label">Songs (${songs.length})</div>${sh}`:''}
     ${tot===0?'<div class="empty" style="padding-top:40px"><div class="empty-ic">🔍</div><h3>No Results</h3><p>Try moods, instruments, genres, or any word from the prompts.</p></div>':''}`;
}

// ──────────────────────────────────────────────────────────────
// NAVIGATION
// ──────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-'+id).classList.add('on');
  document.getElementById('content').scrollTop=0;
  view=id;
}
function goTab(tab){
  prevView=view;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const map={home:'home',browse:'browse',songs:'songs'};
  document.getElementById('tab-'+tab)?.classList.add('on');
  showScreen(map[tab]||tab);
}
function goBack(){
  goTab(prevView==='songs'?'songs':prevView==='browse'?'browse':'home');
  curArtist=null;
}

// ──────────────────────────────────────────────────────────────
// COPY (works on iPhone with both clipboard API and fallback)
// ──────────────────────────────────────────────────────────────
function copyText(id){
  const el=document.getElementById(id);
  const text=el?el.textContent.trim():'';
  if(!text)return;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showToast).catch(()=>legacyCopy(text));
  } else legacyCopy(text);
}
function legacyCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;font-size:16px';
  document.body.appendChild(ta);ta.focus();ta.select();
  // iOS requires this:
  ta.setSelectionRange(0,ta.value.length);
  try{document.execCommand('copy');showToast();}catch(e){}
  document.body.removeChild(ta);
}
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2000);
}

// ──────────────────────────────────────────────────────────────
// OFFLINE / REFRESH
// ──────────────────────────────────────────────────────────────
window.addEventListener('online', ()=>document.getElementById('offline-banner').classList.remove('on'));
window.addEventListener('offline',()=>document.getElementById('offline-banner').classList.add('on'));
if(!navigator.onLine)document.getElementById('offline-banner').classList.add('on');

function refreshData(){
  if(navigator.serviceWorker&&navigator.serviceWorker.controller)
    navigator.serviceWorker.controller.postMessage('CLEAR_ARTIST_CACHE');
  setTimeout(()=>location.reload(),200);
}

// ──────────────────────────────────────────────────────────────
// SERVICE WORKER
// ──────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

loadAll();
